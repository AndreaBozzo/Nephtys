services:
  nats:
    image: nats:latest
    container_name: nephtys_nats
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222"
    command: [ "--jetstream", "--store_dir", "/data", "-m", "8222" ]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: nephtys_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: nephtys_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  nats-data:
