global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'nephtys'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3002']
    # NOTE: On Linux without Docker Desktop, replace host.docker.internal
    # with the host's actual IP or run Nephtys inside the compose network.
